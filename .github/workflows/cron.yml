name: Daily Auto-Shorts
on:
  schedule:
    - cron: '0 14 * * *'
    - cron: '30 3 * * *' # 3:00 UTC is 9:00 AM IST (India Standard Time)
  workflow_dispatch: # <-- ADD THIS SO YOU CAN TEST IT MANUALLY!
    
# CRITICAL: This gives the bot permission to save its memory back to GitHub
permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      # 1. Download your code (Updated to v4 to remove warnings)
      - name: Checkout Repository
        uses: actions/checkout@v4 

      # 2. Setup Node.js Environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Setup Python Environment
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 4. SAFETY NET: Ensure FFmpeg is installed on the GitHub server
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      # 5. Install the TTS Engine (Globally, avoiding the venv trap)
      - name: Install Edge-TTS
        run: pip install edge-tts

      # 6. Install your Node packages
      - name: Install NPM Packages
        run: npm install

      # 7. Run the actual bot!
      - name: Run Auto-Shorts Pipeline
        run: node index.js
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEAPI_TOKEN: ${{ secrets.DEAPI_TOKEN }}
          CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}

      # 8. Save the Story Memory for tomorrow
      - name: Save Bot Memory
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add story_state.json
          git commit -m "🤖 Auto-update story memory" || echo "No state changes to commit"
          git push